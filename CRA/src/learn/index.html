<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxury Watch Showcase</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: radial-gradient(circle at top, #111 0%, #000 60%);
    color:white;
    overflow-x:hidden;
}

/* ===== SECTION BASE ===== */
section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* ===== HERO ===== */
.hero{
    perspective:1200px;
}

.watch-card{
    width:320px;
    height:420px;
    background:linear-gradient(145deg,#0c0c0c,#1a1a1a);
    border-radius:25px;
    box-shadow:
        0 30px 80px rgba(0,0,0,0.9),
        inset 0 0 20px rgba(255,255,255,0.05);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transform-style:preserve-3d;
    transition:transform 0.2s ease;
}

.watch-card::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:25px;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
    opacity:0.4;
    pointer-events:none;
}

.watch-img{
    width:260px;
    transform:translateZ(60px);
    filter:drop-shadow(0 30px 40px rgba(0,0,0,0.9));
}

.watch-title{
    margin-top:25px;
    font-size:20px;
    letter-spacing:2px;
    transform:translateZ(40px);
}

.watch-sub{
    font-size:12px;
    color:#aaa;
    transform:translateZ(30px);
}

/* ===== SCROLL ARROW ===== */
.scroll{
    position:absolute;
    bottom:30px;
    font-size:12px;
    letter-spacing:3px;
    color:#777;
}

/* ===== TEAM ===== */
.team{
    background:linear-gradient(180deg,#000,#070707);
}

.team h1{
    font-size:36px;
    margin-bottom:15px;
    letter-spacing:4px;
}

.team p{
    color:#aaa;
    margin-bottom:40px;
}

.members{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:25px;
    width:80%;
}

.member{
    background:linear-gradient(145deg,#0c0c0c,#1a1a1a);
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.8);
    transition:transform 0.3s;
}

.member:hover{
    transform:translateY(-10px) scale(1.05);
}

.member span{
    font-size:14px;
    color:#999;
}

/* ===== SMOOTH SCROLL ===== */
html{
    scroll-behavior:smooth;
}
</style>
</head>

<body>

<!-- ===== PAGE 1 ===== -->
<section class="hero">
    <div class="watch-card" id="card">
        <img src="https://www.freepik.com/free-photos-vectors/luxury-black-watch" class="watch-img">
        <div class="watch-title">LUXURY AUTOMATIC</div>
        <div class="watch-sub">Premium Edition</div>
    </div>
    <div class="scroll">SCROLL ↓</div>
</section>

<!-- ===== PAGE 2 ===== -->
<section class="team">
    <h1>OUR TEAM</h1>
    <p>Luxury Watch Experience Project</p>

    <div class="members">
        <div class="member">Niveditha<br><span>Team Member</span></div>
        <div class="member">Tejas Kumar<br><span>Team Member</span></div>
        <div class="member">Sanjeev Kumar<br><span>Team Member</span></div>
        <div class="member">Pardhu Gupta<br><span>Team Member</span></div>
        <div class="member">Toni<br><span>Team Member</span></div>
    </div>
</section>

<script>
const card = document.getElementById("card");

document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth / 2 - e.pageX) / 20;
    let y = (window.innerHeight / 2 - e.pageY) / 20;
    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

document.addEventListener("mouseleave", () => {
    card.style.transform = "rotateY(0deg) rotateX(0deg)";
});
</script>

</body>
</html>
